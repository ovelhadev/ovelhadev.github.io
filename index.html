<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OvelhaDev | Profile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>

    <div class="profile-container">
        <header class="profile-header">
            <div class="avatar-wrapper">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=OvelhaDev" alt="OvelhaDev Avatar" class="avatar">
                <div class="status-badge"></div>
            </div>
            <h1>OvelhaDev</h1>
            <p class="tagline">A ovelha dos códigos! 🐑💻</p>
            <p class="bio">Especialista em transformar café e lã em sistemas robustos e interfaces impecáveis.</p>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <span class="stat-value">128</span>
                <span class="stat-label">Repos</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">4.2k</span>
                <span class="stat-label">Stars</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">89</span>
                <span class="stat-label">PRs</span>
            </div>
        </section>

        <section class="section-box">
            <h3><span class="material-icons-round">terminal</span> Skills Principais</h3>
            <div class="tags">
                <span class="tag">PWA</span>
                <span class="tag">JavaScript</span>
                <span class="tag">CSS Grid</span>
                <span class="tag">Node.js</span>
                <span class="tag">UI/UX</span>
            </div>
        </section>

        <nav class="action-links">
            <a href="#" class="btn btn-primary">
                <span class="material-icons-round">mail</span> Contato
            </a>
            <a href="#" class="btn btn-secondary">
                <span class="material-icons-round">code</span> Projetos
            </a>
        </nav>
    </div>

</body>
</html>
